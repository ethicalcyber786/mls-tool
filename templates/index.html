<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MLS TERMINAL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { background: #000; color: #00ff41; font-family: 'Arial Black', sans-serif; margin: 0; padding: 15px; text-transform: >
        .app-container { max-width: 500px; margin: auto; text-align: center; height: 98vh; display: flex; flex-direction: column; j>

        /* GOLD CREDIT BADGE - EXTRA BOLD */
        .credit-badge {
            background: linear-gradient(45deg, #ffd700, #ffae00);
            color: #000; padding: 25px; border-radius: 20px;
            font-size: 30px; font-weight: 900; margin-bottom: 20px;
            display: inline-block; box-shadow: 0 0 25px rgba(255, 215, 0, 0.6);
            width: 85%; border: 4px solid #fff; letter-spacing: -1px;
        }

        .tool-card { border: 2px solid #00ff41; padding: 20px; border-radius: 25px; background: #0a0a0a; box-shadow: 0 0 15px rgba(>
        input[type="file"] { width: 100%; background: #111; color: #00ff41; padding: 15px; border-radius: 12px; margin: 10px 0; bor>
        .exec-btn { width: 100%; padding: 20px; background: #00ff41; color: #000; border: none; border-radius: 15px; font-size: 22p>
        .exec-btn:disabled { background: #1a331a; color: #004400; }
        .progress-bar { width: 100%; height: 20px; background: #111; border-radius: 10px; margin-top: 15px; overflow: hidden; borde>
        .progress-fill { height: 100%; width: 0%; background: #00ff41; transition: 0.4s; box-shadow: 0 0 10px #00ff41; }
        #status { font-size: 13px; margin-top: 10px; font-family: monospace; }
        .dl-btn { display: none; margin-top: 20px; background: #fff; color: #000; padding: 15px; text-decoration: none; border-radi>
    </style>
</head>
<body>
    <div class="app-container">
        <div style="font-size: 10px; text-align: left; opacity: 0.6; margin-bottom: 5px;">SESSION_USER: {{ user.username }}</div>

        <div class="credit-badge">
            <span id="cr">{{ user.credits }}</span> CREDITS LEFT
        </div>

        <div class="tool-card">
            <h2 style="margin: 0 0 15px 0; font-size: 18px;">> MLS_SYNC_V2</h2>
            <input type="file" id="v" accept="video/*">
            <input type="file" id="a" accept="audio/*">
            <button class="exec-btn" id="sbtn" onclick="start()">EXECUTE SYNC</button>
            <div id="status">WAITING_COMMAND...</div>
            <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
            <a id="dl" class="dl-btn" href="#">DOWNLOAD MP4</a>
        </div>
        <a href="/logout" style="color:red; font-size:11px; display:block; margin-top:20px; text-decoration:none;">TERMINATE_SESSIO>
    </div>

    <script>
        var socket = io();
        socket.on('progress', d => {
            document.getElementById('fill').style.width = d.perc + '%';
            document.getElementById('status').innerText = '> ' + d.msg;
        });

        async function start() {
            let v = document.getElementById('v').files[0];
            let a = document.getElementById('a').files[0];
            if(!v || !a) { alert("SELECT FILES!"); return; }
            document.getElementById('sbtn').disabled = true;
            document.getElementById('dl').style.display = 'none';
            let f = new FormData();
            f.append('video', v); f.append('audio', a);
            try {
                let r = await fetch('/edit', {method: 'POST', body: f});
                let d = await r.json();
                if(d.success) {
                    document.getElementById('dl').style.display = 'block';
                    document.getElementById('dl').href = d.download_url;
                    document.getElementById('cr').innerText = d.new_credits;
                } else if(d.error === "CREDIT_EXPIRED") {
                    if(confirm(d.msg)) { window.location.href = "/upgrade"; }
                } else { alert("SYSTEM_ERROR: " + d.error); }
            } catch(e) { alert("SERVER_TIMEOUT"); }
            document.getElementById('sbtn').disabled = false;
        }
    </script>
</body>
</html>
